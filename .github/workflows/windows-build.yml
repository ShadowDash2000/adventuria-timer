name: Build Windows Release

on:
  push:
    branches: [ "release" ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build (release)
        run: cargo build --release

      - name: Package artifact (zip)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exePath = Join-Path "$env:GITHUB_WORKSPACE" "target/release/adventuria-timer.exe"
          if (!(Test-Path $exePath)) { throw "Executable not found: $exePath" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $exePath artifacts/
          Compress-Archive -Path artifacts/* -DestinationPath adventuria-timer-windows-x86_64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adventuria-timer-windows-x86_64
          path: adventuria-timer-windows-x86_64.zip
          if-no-files-found: error
